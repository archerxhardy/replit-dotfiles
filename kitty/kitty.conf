# Fonts
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# Cursor
cursor_shape block
cursor_blink_interval 0.5

# Scrollback
scrollback_lines 10000

# Mouse
url_color #89b4fa
url_style curly

# Window layout
window_padding_width 10
hide_window_decorations yes
confirm_os_window_close 0

# Colors (Dark Minimal)
background #050505
foreground #cdd6f4
selection_background #585b70
selection_foreground #cdd6f4
cursor #cdd6f4
cursor_text_color #11111b

# Normal
color0 #45475a
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #89b4fa
color5 #f5c2e7
color6 #94e2d5
color7 #bac2de

# Bright
color8 #585b70
color9 #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

# Transparency
background_opacity 0.85
dynamic_background_opacity yes
